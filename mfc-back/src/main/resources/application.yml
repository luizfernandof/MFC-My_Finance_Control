jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

spring:
  data:
    web:
      pageable:
        max-page-size: 100
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mfc_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: "${DB_DDL:update}"
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: disabled
      password: disable

server:
  port: "${SERVER_PORT:8081}"
  servlet:
    context-path: /api

